mg400_status_node:
  ros__parameters:
    robot_ip: "192.168.1.6"     # MG400 IP (네트워크에 맞게 수정)
    feed_port: 30004            # 실시간 피드백 포트
    publish_rate: 10.0          # 상태 발행 주기 (Hz)
    base_frame: "mg400_base_link"
    joint_names: ["joint1", "joint2", "joint3", "joint4"]
    joints_in_degrees: true     # 로봇이 deg 로 보고 -> rad 로 변환해 발행

mg400_move_node:
  ros__parameters:
    robot_ip: "192.168.1.6"     # MG400 IP (네트워크에 맞게 수정)
    dashboard_port: 29999       # 명령(Enable/Clear 등) 포트
    move_port: 30003            # 모션(MovL) 포트
    # feed(30004)는 열지 않고 status_node 의 tcp_pose 를 구독해 도착 판정
    tcp_pose_topic: "/mg400_status_node/tcp_pose"
    auto_enable: true           # 시작 시 EnableRobot
    pos_tolerance_mm: 1.0       # 도착 판정 위치 오차(mm)
    rot_tolerance_deg: 1.0      # 도착 판정 R 오차(deg)
    arrival_timeout: 30.0       # 도착 대기 한계(s)
